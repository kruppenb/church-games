# Deploy to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Run tests
        working-directory: site
        run: npm run test

      - name: Build
        working-directory: site
        run: npm run build
        env:
          GITHUB_ACTIONS: true

      - name: Check bundle size
        working-directory: site
        run: |
          # Check no single JS chunk exceeds 1MB (1048576 bytes)
          # Exclude the phaser vendor chunk which is expected to be large
          for file in dist/assets/*.js; do
            size=$(wc -c < "$file")
            filename=$(basename "$file")
            if [[ "$filename" != phaser* ]] && [ "$size" -gt 1048576 ]; then
              echo "ERROR: $filename is ${size} bytes (exceeds 1MB limit)"
              exit 1
            fi
          done
          # Check total JS size (excluding phaser) under 2MB
          total=$(find dist/assets -name '*.js' ! -name 'phaser*' -exec cat {} + | wc -c)
          if [ "$total" -gt 2097152 ]; then
            echo "ERROR: Total JS (excluding phaser) is ${total} bytes (exceeds 2MB limit)"
            exit 1
          fi
          echo "Bundle size check passed"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
